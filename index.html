<!doctype html>
<html lang="fr">

<head>
  <!-- LCP Preload (Star Image) -->

  <!-- FOUT/CLS Mitigation: Font Preconnects MUST be early -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet"
  >

  <!-- Google Tracking Preconnects -->
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://www.google-analytics.com">
  <link rel="preload" as="image" href="/images/winter-in-the-fruit/empire-state.avif" type="image/avif" fetchpriority="high">

  <!-- Google Consent Mode v2 Default (Deferred Loading Proxy) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('consent', 'default', {
      'analytics_storage': 'denied',
      'ad_storage': 'denied',
      'ad_user_data': 'denied',
      'ad_personalization': 'denied',
      'wait_for_update': 500
    });
    
    // Defer GTM to prioritize LCP
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.createElement('script');
        s.src = '/analytics.js';
        s.async = true;
        document.head.appendChild(s);
      }, 2000);
    });
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO PRIMARY (Managed via SEO.tsx / Edge Functions) -->
  <title>Borntwolate | Photographie Argentique &amp; Tirages d'Art - Paris</title>

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.borntwolate.com/" />
  <meta property="og:title" content="Born Too Late — Photographie Argentique Paris" />
  <meta property="og:description" content="Tirages d'art argentiques numérotés. Photographe Paris — Rollei 35, Portra 400, Kodak TRI-X." />
  <meta property="og:image" content="https://www.borntwolate.com/social-card.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Born Too Late" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Born Too Late — Photographie Argentique Paris" />
  <meta name="twitter:description" content="Tirages d'art argentiques numérotés. Photographe Paris — Rollei 35, Portra 400, Kodak TRI-X." />
  <meta name="twitter:image" content="https://www.borntwolate.com/social-card.jpg" />

  <!-- SCHEMA.ORG JSON-LD (Strict Audit) -->
  <!-- Moved to src/components/SEO.tsx for dynamic handling -->

  <!-- NOTE: CSP is enforced via netlify.toml HTTP headers (higher priority than meta). DO NOT add a CSP meta tag here. -->

  <style>
    /* Critical LCP Shell Styles */
    body { background-color: #0A0A0A; margin: 0; padding: 0; }
    #root:empty { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
    
    .loading-shell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Space Mono', monospace;
      z-index: 10;
    }
    
    .loading-text {
      color: #D4A574;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8em;
      animation: pulse 3s ease-in-out infinite;
    }

    .loading-bar-container {
      width: 6rem;
      height: 1px;
      background-color: rgba(255,255,255,0.1);
      margin-top: 1rem;
      overflow: hidden;
      position: relative;
    }

    .loading-bar {
      width: 100%;
      height: 100%;
      background-color: rgba(139, 0, 0, 0.4);
      position: absolute;
      left: -100%;
      animation: progress 2s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    @keyframes progress {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* Minimal grain for shell */
    .shell-grain {
      position: fixed;
      inset: 0;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="shell-grain"></div>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KGB4WP3K"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div id="root">
    <!-- Darkroom LCP Shell (Replaced during Hydration) -->
    <div class="loading-shell">
      <div class="loading-text">DÉVELOPPEMENT...</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>
  <!-- Netlify Form Detection -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="user_name" />
    <input type="email" name="user_email" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
    <textarea name="selection"></textarea>
  </form>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
